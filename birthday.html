<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>happy birthday - Jeff Curry</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Times New Roman", Times, serif;
      background: #fffff8;
      color: #111;
      min-height: 100vh;
      position: relative;
      cursor: default;
    }
    .close-btn {
      position: fixed;
      top: 1rem;
      right: 1.2rem;
      font-family: "Times New Roman", Times, serif;
      font-size: 1.5rem;
      color: #999;
      text-decoration: none;
      line-height: 1;
      z-index: 10;
    }
    .close-btn:hover { color: #111; }

    /* Centered overlay containers — only one is visible at a time */
    #lock-screen, #scene, #poem {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      max-width: 640px;
      padding: 1rem;
    }

    /* === Lock screen === */
    #lock-screen { text-align: center; }
    #lock-screen h1 {
      font-size: 1.4rem;
      font-weight: normal;
      margin-bottom: 1.5rem;
    }
    #lock-screen .hint {
      font-size: 0.9rem;
      color: #888;
      margin-top: 1rem;
    }
    #pw {
      font-family: "Times New Roman", Times, serif;
      font-size: 1.1rem;
      padding: 0.5rem 0.8rem;
      border: 1px solid #111;
      background: none;
      width: 220px;
      text-align: center;
      outline: none;
    }
    #pw.shake { animation: shake 0.4s; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    /* === Scene === */
    #scene {
      display: none;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    #scene.show { display: block; }
    #scene.dim { opacity: 0; pointer-events: none; }

    #stage {
      width: 100%;
      height: auto;
      animation: fade-in 0.6s ease;
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    .pixel-sprite { shape-rendering: crispEdges; }

    /* Bird */
    .bird {
      animation: bird-fly 4s linear forwards;
      animation-delay: 0.5s;
      transform: translate(-30px, 0);
    }
    @keyframes bird-fly {
      0%   { transform: translate(-30px, 0); }
      40%  { transform: translate(70px, -2px); }
      55%  { transform: translate(95px, 4px); }
      100% { transform: translate(220px, -3px); }
    }
    .bird-frame-1, .bird-frame-2 {
      animation-duration: 0.25s;
      animation-iteration-count: infinite;
      animation-timing-function: steps(1);
      animation-delay: 0.5s;
    }
    .bird-frame-1 { animation-name: flap-a; }
    .bird-frame-2 { animation-name: flap-b; opacity: 0; }
    @keyframes flap-a { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes flap-b { 0%,49% { opacity: 0; } 50%,100% { opacity: 1; } }

    .carried-letter {
      animation: carried-hide 4.5s steps(1) forwards;
      animation-delay: 0.5s;
    }
    @keyframes carried-hide {
      0%, 41% { opacity: 1; }
      42%, 100% { opacity: 0; }
    }

    /* Letter — drops in automatically, but only clickable + pulsing once .ready */
    .letter-drop {
      opacity: 0;
      animation: letter-drop 1.3s cubic-bezier(.5,.05,.7,.7) forwards;
      animation-delay: 2.4s;
    }
    @keyframes letter-drop {
      0%   { opacity: 0; transform: translate(0, -75px) rotate(-18deg); }
      8%   { opacity: 1; }
      85%  { transform: translate(0, 0) rotate(2deg); }
      100% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
    }
    .letter-clickable {
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 0.2s ease;
    }
    .letter-clickable.ready { cursor: pointer; }
    .letter-clickable.ready:hover { transform: scale(1.12); }
    .letter-pulse {
      transform-box: fill-box;
      transform-origin: center;
    }
    .letter-pulse.ready {
      animation: letter-pulse 1.4s ease-in-out infinite;
    }
    @keyframes letter-pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }

    /* Door — clickable, swings open only on .opening */
    .door-body {
      cursor: pointer;
      transform-box: fill-box;
      transform-origin: left center;
    }
    .door-body.opening {
      animation: door-open 0.6s ease-out forwards;
    }
    @keyframes door-open {
      0%   { transform: scaleX(1); }
      100% { transform: scaleX(0.1); }
    }
    /* Doorknob pulse hint after letter drops, until door clicked */
    .doorknob {
      transform-box: fill-box;
      transform-origin: center;
      animation: knob-pulse 1.6s ease-in-out infinite;
      animation-delay: 4s;
    }
    @keyframes knob-pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.6); }
    }
    .door-clicked .doorknob { animation: none; }

    /* Cat — emerges from door only on .emerging */
    .cat {
      opacity: 0;
      transform: translate(-17px, -28px);
    }
    .cat.emerging {
      animation:
        cat-fade-in 0.3s ease forwards,
        cat-walk-out 1.6s cubic-bezier(.4,.0,.4,1) forwards 0.3s;
    }
    @keyframes cat-fade-in { to { opacity: 1; } }
    @keyframes cat-walk-out {
      from { transform: translate(-17px, -28px); }
      to   { transform: translate(0, 0); }
    }
    .cat.emerging .cat-bob {
      animation: cat-bob 0.32s steps(2) infinite 0.3s;
    }
    @keyframes cat-bob {
      0%,49%   { transform: translateY(0); }
      50%,100% { transform: translateY(-1px); }
    }
    .cat.emerging .cat-paw {
      animation: cat-scratch 0.22s ease-in-out infinite 1.9s;
    }
    .cat-paw {
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes cat-scratch {
      0%, 100% { transform: translate(0, 0); }
      50%      { transform: translate(-2px, -2px); }
    }
    .spark { opacity: 0; }
    .cat.emerging .spark {
      animation: spark-flash 0.22s ease-out infinite 1.9s;
    }
    .cat.emerging .spark-2 { animation-delay: 2.01s; }
    @keyframes spark-flash {
      0%   { opacity: 0; transform: translate(0, 0) scale(0.6); }
      40%  { opacity: 1; }
      100% { opacity: 0; transform: translate(-2px, -2px) scale(1.1); }
    }

    /* Clickable hotspots — sun, chimney, dachshund sign */
    #sun, #chimney, #dachshund-sign {
      cursor: pointer;
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 0.15s ease;
    }
    #sun:hover         { transform: scale(1.1); }
    #chimney:hover     { transform: scale(1.06); }
    #dachshund-sign:hover { transform: scale(1.08); }

    /* Easter egg sprites — animations driven by Web Animations API
       so each click gets a fresh, restartable animation */
    .dachshund { opacity: 0; }
    .roll-cat {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
    }
    .balloons { opacity: 0; }
    .balloons.released { opacity: 1; }

    /* Door hint text — fades in after letter drops, fades out after door clicked */
    #door-hint {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.5rem;
      font-style: italic;
      opacity: 0;
      animation: hint-in 0.5s ease forwards;
      animation-delay: 4s;
      transition: opacity 0.4s ease;
    }
    @keyframes hint-in { to { opacity: 0.7; } }
    .door-clicked #door-hint { opacity: 0; }

    /* Bottom-right back link (replaces skip) */
    #back-home {
      display: block;
      text-align: right;
      font-size: 0.85rem;
      color: #999;
      margin-top: 0.4rem;
      cursor: pointer;
      text-decoration: underline;
      user-select: none;
    }
    #back-home:hover { color: #111; }

    /* === Poem === */
    #poem {
      display: none;
      animation: poem-in 0.6s ease;
    }
    #poem.show { display: block; }
    @keyframes poem-in {
      from { opacity: 0; transform: translate(-50%, -46%); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }
    .paper {
      background: #fdf8e8;
      border: 1px solid #ddd6c0;
      padding: 2.5rem 2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      font-size: 1rem;
      line-height: 1.75;
    }
    .paper h2 {
      font-size: 1.3rem;
      font-weight: normal;
      text-align: center;
      margin-bottom: 1.8rem;
      color: #444;
    }
    .paper p { margin-bottom: 1rem; }
    .paper p:last-of-type { margin-bottom: 0; }
    .paper .back {
      display: inline-block;
      margin-top: 2rem;
      color: #0000ee;
      text-decoration: underline;
      padding: 2px 4px;
      cursor: pointer;
    }
    .paper .back:hover {
      background: #00e5ff;
      color: #111;
      text-decoration: none;
    }

    @media (max-width: 480px) {
      .paper { padding: 1.8rem 1.2rem; font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <a href="/" class="close-btn">&times;</a>

  <!-- State 1: Lock -->
  <div id="lock-screen">
    <h1>for mom</h1>
    <input type="password" id="pw" autofocus autocomplete="off" spellcheck="false">
    <p class="hint">password</p>
  </div>

  <!-- State 2: Animated scene -->
  <div id="scene">
    <svg id="stage" viewBox="0 0 192 160" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="wobble" x="-2%" y="-2%" width="104%" height="104%">
          <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="3"/>
          <feDisplacementMap in="SourceGraphic" scale="1.2"/>
        </filter>
      </defs>

      <!-- ====== Crayon-style background ====== -->
      <g filter="url(#wobble)">
        <!-- Sky -->
        <rect x="0" y="0" width="192" height="100" fill="#bcd9eb"/>

        <!-- Sun (clickable — rolls a fat cat across) -->
        <g id="sun">
          <circle cx="160" cy="20" r="9" fill="#ffd633" stroke="#d4901a" stroke-width="0.8"/>
          <line x1="160" y1="6"  x2="160" y2="2"  stroke="#d4901a" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="160" y1="38" x2="160" y2="34" stroke="#d4901a" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="146" y1="20" x2="142" y2="20" stroke="#d4901a" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="174" y1="20" x2="178" y2="20" stroke="#d4901a" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="150" y1="10" x2="146" y2="6"  stroke="#d4901a" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="170" y1="10" x2="174" y2="6"  stroke="#d4901a" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="150" y1="30" x2="146" y2="34" stroke="#d4901a" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="170" y1="30" x2="174" y2="34" stroke="#d4901a" stroke-width="1.4" stroke-linecap="round"/>
        </g>

        <!-- Cloud -->
        <ellipse cx="30" cy="14" rx="14" ry="5"  fill="#ffffff" stroke="#999" stroke-width="0.6"/>
        <ellipse cx="22" cy="11" rx="6"  ry="3"  fill="#ffffff" stroke="#999" stroke-width="0.6"/>
        <ellipse cx="44" cy="20" rx="6"  ry="3"  fill="#ffffff" stroke="#999" stroke-width="0.6"/>

        <!-- Triangle roof -->
        <path d="M 12 50 L 96 14 L 180 50 Z" fill="#e25555" stroke="#5a1818" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M 30 45 Q 60 30 90 22"   stroke="#8b2828" stroke-width="0.5" fill="none" opacity="0.5"/>
        <path d="M 60 45 Q 90 30 120 22"  stroke="#8b2828" stroke-width="0.5" fill="none" opacity="0.5"/>
        <path d="M 100 22 Q 130 30 160 45" stroke="#8b2828" stroke-width="0.5" fill="none" opacity="0.5"/>

        <!-- Chimney (clickable — releases balloons) -->
        <g id="chimney">
          <rect x="138" y="22" width="6"  height="20" fill="#7a4d28" stroke="#3a2018" stroke-width="0.8"/>
          <rect x="136" y="20" width="10" height="2"  fill="#5a3820" stroke="#3a2018" stroke-width="0.4"/>
        </g>

        <!-- House body -->
        <rect x="14" y="50" width="164" height="96" fill="#f5e1a8" stroke="#5a3820" stroke-width="1.4" rx="2"/>

        <!-- Floor divider -->
        <line x1="14" y1="93" x2="178" y2="93" stroke="#a07a50" stroke-width="0.8"/>

        <!-- Upper windows -->
        <rect x="32" y="62" width="20" height="16" fill="#8cc4e0" stroke="#5a3820" stroke-width="1" rx="1"/>
        <line x1="42" y1="62" x2="42" y2="78" stroke="#5a3820" stroke-width="0.7"/>
        <line x1="32" y1="70" x2="52" y2="70" stroke="#5a3820" stroke-width="0.7"/>

        <rect x="140" y="62" width="20" height="16" fill="#8cc4e0" stroke="#5a3820" stroke-width="1" rx="1"/>
        <line x1="150" y1="62" x2="150" y2="78" stroke="#5a3820" stroke-width="0.7"/>
        <line x1="140" y1="70" x2="160" y2="70" stroke="#5a3820" stroke-width="0.7"/>

        <!-- Lower windows -->
        <rect x="28" y="106" width="20" height="16" fill="#8cc4e0" stroke="#5a3820" stroke-width="1" rx="1"/>
        <line x1="38" y1="106" x2="38" y2="122" stroke="#5a3820" stroke-width="0.7"/>
        <line x1="28" y1="114" x2="48" y2="114" stroke="#5a3820" stroke-width="0.7"/>

        <rect x="144" y="106" width="20" height="16" fill="#8cc4e0" stroke="#5a3820" stroke-width="1" rx="1"/>
        <line x1="154" y1="106" x2="154" y2="122" stroke="#5a3820" stroke-width="0.7"/>
        <line x1="144" y1="114" x2="164" y2="114" stroke="#5a3820" stroke-width="0.7"/>

        <!-- Door frame -->
        <rect x="80" y="98" width="32" height="48" fill="#4a2810" stroke="#3a2018" stroke-width="0.8"/>
        <rect x="82" y="100" width="28" height="46" fill="#2a1a10"/>

        <!-- Door body (clickable — opens to release cat) -->
        <g class="door-body" id="door-body">
          <rect x="82" y="100" width="28" height="46" fill="#8b5a2b" stroke="#5a3820" stroke-width="0.8"/>
          <rect x="86" y="104" width="20" height="14" fill="none" stroke="#5a3820" stroke-width="0.7" rx="1"/>
          <rect x="86" y="128" width="20" height="14" fill="none" stroke="#5a3820" stroke-width="0.7" rx="1"/>
          <circle class="doorknob" cx="105" cy="122" r="1.5" fill="#d4a017" stroke="#a8801a" stroke-width="0.4"/>
        </g>

        <!-- Dachshund sign (mounted on the wall beside the door — stays visible
             whether the door is closed or open. Clickable: runs a halo'd
             dachshund across the screen) -->
        <g id="dachshund-sign">
          <!-- Tiny mounting bracket above sign -->
          <rect x="123" y="111" width="4" height="1" fill="#5a3820"/>
          <!-- Sign panel -->
          <rect x="116" y="112" width="18" height="14" fill="#fdf8e8" stroke="#5a3820" stroke-width="0.6" rx="0.6"/>
          <!-- Dachshund silhouette -->
          <rect x="119" y="119" width="12" height="2" fill="#5a3018"/>
          <rect x="130" y="117" width="3"  height="3" fill="#5a3018"/>
          <rect x="133" y="118" width="1"  height="2" fill="#5a3018"/>
          <rect x="131" y="116" width="1"  height="1" fill="#5a3018"/>
          <rect x="131" y="118" width="1"  height="1" fill="#fdf8e8"/>
          <rect x="117" y="119" width="2"  height="1" fill="#5a3018"/>
          <rect x="117" y="118" width="1"  height="1" fill="#5a3018"/>
          <rect x="128" y="121" width="1"  height="3" fill="#5a3018"/>
          <rect x="130" y="121" width="1"  height="3" fill="#5a3018"/>
          <rect x="119" y="121" width="1"  height="3" fill="#5a3018"/>
          <rect x="121" y="121" width="1"  height="3" fill="#5a3018"/>
        </g>

        <!-- Door step -->
        <rect x="76" y="146" width="40" height="2" fill="#7a5a3a" stroke="#5a3820" stroke-width="0.4"/>

        <!-- Doormat -->
        <rect x="72" y="148" width="48" height="3" fill="#6b4423" stroke="#3e2710" stroke-width="0.6" rx="1"/>
        <line x1="80"  y1="149" x2="80"  y2="151" stroke="#3e2710" stroke-width="0.5"/>
        <line x1="88"  y1="149" x2="88"  y2="151" stroke="#3e2710" stroke-width="0.5"/>
        <line x1="96"  y1="149" x2="96"  y2="151" stroke="#3e2710" stroke-width="0.5"/>
        <line x1="104" y1="149" x2="104" y2="151" stroke="#3e2710" stroke-width="0.5"/>
        <line x1="112" y1="149" x2="112" y2="151" stroke="#3e2710" stroke-width="0.5"/>

        <!-- Grass -->
        <rect x="0" y="146" width="192" height="14" fill="#82c75d" stroke="#4a7530" stroke-width="0.6"/>
        <path d="M 4 146 L 5 142 L 6 146"        stroke="#4a7530" stroke-width="0.6" fill="none"/>
        <path d="M 12 146 L 14 141 L 16 146"     stroke="#4a7530" stroke-width="0.6" fill="none"/>
        <path d="M 28 146 L 30 142 L 32 146"     stroke="#4a7530" stroke-width="0.6" fill="none"/>
        <path d="M 50 146 L 52 141 L 54 146"     stroke="#4a7530" stroke-width="0.6" fill="none"/>
        <path d="M 130 146 L 132 142 L 134 146"  stroke="#4a7530" stroke-width="0.6" fill="none"/>
        <path d="M 158 146 L 160 142 L 162 146"  stroke="#4a7530" stroke-width="0.6" fill="none"/>
        <path d="M 175 146 L 177 141 L 179 146"  stroke="#4a7530" stroke-width="0.6" fill="none"/>

        <!-- Letter -->
        <g class="letter-drop">
          <g class="letter-pulse" id="letter-pulse">
            <g class="letter-clickable" id="letter">
              <ellipse cx="96" cy="148" rx="9" ry="0.8" fill="#5a3820" opacity="0.25"/>
              <rect x="86" y="139" width="20" height="9" fill="#fffaf0" stroke="#5a3820" stroke-width="0.8" rx="1"/>
              <path d="M 86 139 L 96 145 L 106 139" stroke="#5a3820" stroke-width="0.8" fill="#f5e8c8"/>
              <circle cx="96" cy="143" r="1.6" fill="#c44" stroke="#882020" stroke-width="0.3"/>
            </g>
          </g>
        </g>

        <!-- Balloons (released by chimney click) -->
        <g id="balloons" class="balloons">
          <g class="balloon">
            <ellipse cx="141" cy="18" rx="2" ry="2.5" fill="#ff8caa" stroke="#aa3060" stroke-width="0.4"/>
            <line x1="141" y1="20.5" x2="141" y2="24" stroke="#aa3060" stroke-width="0.4"/>
          </g>
          <g class="balloon balloon-2">
            <ellipse cx="146" cy="20" rx="2" ry="2.5" fill="#66b8e0" stroke="#1a5a90" stroke-width="0.4"/>
            <line x1="146" y1="22.5" x2="146" y2="26" stroke="#1a5a90" stroke-width="0.4"/>
          </g>
          <g class="balloon balloon-3">
            <ellipse cx="139" cy="22" rx="2" ry="2.5" fill="#ffd633" stroke="#a07010" stroke-width="0.4"/>
            <line x1="139" y1="24.5" x2="139" y2="28" stroke="#a07010" stroke-width="0.4"/>
          </g>
        </g>
      </g>

      <!-- ====== Pixel-art bird (kept crisp, outside wobble filter) ====== -->
      <g class="bird pixel-sprite">
        <g class="bird-frame-1">
          <rect x="0"  y="14" width="6" height="3" fill="#222"/>
          <rect x="6"  y="15" width="2" height="1" fill="#f4a017"/>
          <rect x="-2" y="12" width="3" height="2" fill="#222"/>
          <rect x="3"  y="12" width="3" height="2" fill="#222"/>
          <rect x="4"  y="14" width="1" height="1" fill="#fff"/>
        </g>
        <g class="bird-frame-2">
          <rect x="0"  y="14" width="6" height="3" fill="#222"/>
          <rect x="6"  y="15" width="2" height="1" fill="#f4a017"/>
          <rect x="-2" y="17" width="3" height="2" fill="#222"/>
          <rect x="3"  y="17" width="3" height="2" fill="#222"/>
          <rect x="4"  y="14" width="1" height="1" fill="#fff"/>
        </g>
        <g class="carried-letter">
          <rect x="1" y="19" width="5" height="3" fill="#fffaf0" stroke="#5a3820" stroke-width="0.4"/>
        </g>
      </g>

      <!-- ====== Pixel-art cat (grey, kept crisp, outside wobble filter) ====== -->
      <g class="cat pixel-sprite" id="cat">
        <g class="cat-bob">
          <rect x="123" y="135" width="3" height="2" fill="#8a8a8a"/>
          <rect x="125" y="132" width="2" height="4" fill="#8a8a8a"/>
          <rect x="123" y="130" width="2" height="2" fill="#8a8a8a"/>
          <rect x="108" y="136" width="16" height="9" fill="#8a8a8a"/>
          <rect x="110" y="143" width="12" height="2" fill="#a4a4a4"/>
          <rect x="100" y="130" width="9" height="9" fill="#8a8a8a"/>
          <rect x="100" y="128" width="2" height="2" fill="#8a8a8a"/>
          <rect x="106" y="128" width="2" height="2" fill="#8a8a8a"/>
          <rect x="106" y="129" width="1" height="1" fill="#fbbac8"/>
          <rect x="101" y="133" width="1" height="2" fill="#ffea00"/>
          <rect x="101" y="134" width="1" height="1" fill="#1a1a1a"/>
          <rect x="100" y="136" width="1" height="1" fill="#fbbac8"/>
          <rect x="98"  y="136" width="2" height="1" fill="#bbb" opacity="0.7"/>
          <rect x="115" y="145" width="2" height="2" fill="#8a8a8a"/>

    const ITERATIONS = 200000;

    const lockScreen   = document.getElementById('lock-screen');
    const scene        = document.getElementById('scene');
    const poem         = document.getElementById('poem');
    const pw           = document.getElementById('pw');
    const doorBody     = document.getElementById('door-body');
    const cat          = document.getElementById('cat');
    const letter       = document.getElementById('letter');
    const letterPulse  = document.getElementById('letter-pulse');
    const sun          = document.getElementById('sun');
    const chimney      = document.getElementById('chimney');
    const dachshundSign = document.getElementById('dachshund-sign');
    const dachshund    = document.getElementById('dachshund');
    const rollCat      = document.getElementById('roll-cat');
    const balloons     = document.getElementById('balloons');
    const backToHouse  = document.getElementById('back-to-house');

    function b64ToBytes(s) {
      return Uint8Array.from(atob(s), c => c.charCodeAt(0));
    }

    async function decryptPoem(password) {
      const enc = new TextEncoder();
      const baseKey = await crypto.subtle.importKey(
        'raw', enc.encode(password),
        { name: 'PBKDF2' }, false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: b64ToBytes(SALT_B64), iterations: ITERATIONS, hash: 'SHA-256' },
        baseKey,
        { name: 'AES-GCM', length: 256 },
        false, ['decrypt']
      );
      const ptBuf = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: b64ToBytes(IV_B64) },
        key, b64ToBytes(CT_B64)
      );
      return new TextDecoder().decode(ptBuf);
    }

    async function tryUnlock() {
      const guess = pw.value.toLowerCase().trim();
      try {
        const html = await decryptPoem(guess);
        document.getElementById('poem-content').innerHTML = html;
        lockScreen.style.display = 'none';
        scene.classList.add('show');
      } catch (e) {
        pw.classList.remove('shake');
        void pw.offsetWidth;
        pw.classList.add('shake');
        pw.value = '';
      }
    }

    // Door click → swing open → cat emerges → letter becomes ready
    let doorOpened = false;
    function openDoor() {
      if (doorOpened) return;
      doorOpened = true;
      scene.classList.add('door-clicked');
      doorBody.classList.add('opening');
      setTimeout(() => cat.classList.add('emerging'), 400);
      setTimeout(() => {
        letter.classList.add('ready');
        letterPulse.classList.add('ready');
      }, 2400);
    }

    function openLetter() {
      if (!letter.classList.contains('ready')) return;
      scene.classList.add('dim');
      poem.classList.add('show');
    }

    function showHouse() {
      scene.classList.remove('dim');
      poem.classList.remove('show');
    }

    // Easter eggs — Web Animations API so each click cancels and replays
    function runDachshund() {
      dachshund.getAnimations().forEach(a => a.cancel());
      dachshund.animate([
        { opacity: 0, transform: 'translateX(-220px)' },
        { opacity: 1, transform: 'translateX(-180px)', offset: 0.05 },
        { opacity: 1, transform: 'translateX(180px)',  offset: 0.95 },
        { opacity: 0, transform: 'translateX(220px)' }
      ], { duration: 2600, easing: 'linear', fill: 'forwards' });
    }

    function rollTheCat() {
      rollCat.getAnimations().forEach(a => a.cancel());
      rollCat.animate([
        { opacity: 0, transform: 'translateX(-220px) rotate(0deg)' },
        { opacity: 1, transform: 'translateX(-180px) rotate(54deg)',    offset: 0.05 },
        { opacity: 1, transform: 'translateX(180px) rotate(1026deg)',   offset: 0.95 },
        { opacity: 0, transform: 'translateX(220px) rotate(1080deg)' }
      ], { duration: 3000, easing: 'linear', fill: 'forwards' });
    }

    function releaseBalloons() {
      balloons.classList.add('released');
      balloons.querySelectorAll('.balloon').forEach((b, i) => {
        b.getAnimations().forEach(a => a.cancel());
        b.animate([
          { transform: 'translate(0, 0)',         opacity: 1 },
          {                                       opacity: 1, offset: 0.85 },
          { transform: 'translate(14px, -200px)', opacity: 0 }
        ], { duration: 3200, easing: 'ease-in', fill: 'forwards', delay: i * 180 });
      });
    }

    pw.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') tryUnlock();
    });

    doorBody.addEventListener('click', openDoor);
    letter.addEventListener('click', openLetter);
    backToHouse.addEventListener('click', showHouse);

    sun.addEventListener('click', (e) => { e.stopPropagation(); rollTheCat(); });
    chimney.addEventListener('click', (e) => { e.stopPropagation(); releaseBalloons(); });
    dachshundSign.addEventListener('click', (e) => { e.stopPropagation(); runDachshund(); });
  </script>
