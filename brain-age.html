<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Age - Jeff Curry</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Times New Roman", Times, serif;
      background: #fffff8;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: default;
    }
    .container {
      text-align: center;
      width: 100%;
      max-width: 500px;
      padding: 1rem;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: normal;
      margin-bottom: 1rem;
    }
    .subtitle {
      color: #555;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    #start-btn {
      font-family: "Times New Roman", Times, serif;
      font-size: 1.1rem;
      padding: 0.6rem 2rem;
      background: none;
      border: 1px solid #111;
      cursor: pointer;
      color: #111;
      transition: background 0.15s;
    }
    #start-btn:hover {
      background: #00e5ff;
    }

    #game {
      display: none;
      position: relative;
    }
    #timer {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      font-variant-numeric: tabular-nums;
    }
    #progress {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 1rem;
    }

    #problems {
      height: 180px;
      overflow: hidden;
      position: relative;
      margin-bottom: 1.5rem;
    }
    .problem-row {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      transition: opacity 0.2s;
    }
    .problem-row.prev {
      opacity: 0.25;
      font-size: 1.3rem;
    }
    .problem-row.current {
      opacity: 1;
      position: relative;
    }
    .problem-row.current::before {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 100%;
      border: 2px solid #111;
      pointer-events: none;
    }
    .problem-row.next {
      opacity: 0.25;
      font-size: 1.3rem;
    }
    .correct-mark {
      color: #44bb44;
      margin-left: 0.5rem;
    }
    .wrong-mark {
      color: #ee4444;
      margin-left: 0.5rem;
    }

    #draw-area {
      position: relative;
      margin: 0 auto;
      width: 280px;
    }
    #draw-canvas {
      border: 1px solid #ccc;
      background: white;
      touch-action: none;
    }
    #draw-hint {
      font-size: 0.8rem;
      color: #999;
      margin-top: 0.5rem;
    }
    #clear-btn {
      font-family: "Times New Roman", Times, serif;
      font-size: 0.95rem;
      padding: 0.4rem 1.5rem;
      background: none;
      border: 1px solid #ccc;
      cursor: pointer;
      color: #555;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }
    #clear-btn:hover {
      background: #00e5ff;
      color: #111;
    }
    #recognized {
      font-size: 2rem;
      height: 2.5rem;
      margin-top: 0.5rem;
      font-variant-numeric: tabular-nums;
    }

    #results {
      display: none;
    }
    #results h2 {
      font-size: 1.4rem;
      font-weight: normal;
      margin-bottom: 1rem;
    }
    #final-time {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    #accuracy {
      color: #555;
      margin-bottom: 1.5rem;
    }
    #results a {
      color: #0000ee;
      text-decoration: underline;
      padding: 2px 4px;
    }
    #results a:hover {
      background: #00e5ff;
      color: #111;
      text-decoration: none;
    }
    #loading {
      display: none;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="start-screen">
      <h1>Calculations x 20</h1>
      <p class="subtitle">solve 20 problems as fast as you can<br>click to draw, release to lift<br>press c to clear</p>
      <div id="loading">loading model...</div>
      <button id="start-btn">start</button>
    </div>

    <div id="game">
      <div id="timer">0.0s</div>
      <div id="progress">1 / 20</div>
      <div id="problems">
        <div class="problem-row prev" id="prob-prev"></div>
        <div class="problem-row current" id="prob-current"></div>
        <div class="problem-row next" id="prob-next"></div>
      </div>
      <div id="draw-area">
        <canvas id="draw-canvas" width="280" height="200"></canvas>
        <div id="recognized">&nbsp;</div>
        <button id="clear-btn">clear</button>
        <div id="draw-hint">press to draw, lift to stop &middot; c to clear</div>
      </div>
    </div>

    <div id="results">
      <h2>finished</h2>
      <div id="final-time"></div>
      <div id="accuracy"></div>
      <a href="brain-age.html">play again</a><br><br>
      <a href="/">back</a>
    </div>
  </div>

  <script>
    // --- Problem generation ---
    function genProblem() {
      const ops = ['+', '-', '×'];
      const op = ops[Math.floor(Math.random() * ops.length)];
      let a, b, answer;
      if (op === '+') {
        a = Math.floor(Math.random() * 20) + 1;
        b = Math.floor(Math.random() * 20) + 1;
        answer = a + b;
      } else if (op === '-') {
        a = Math.floor(Math.random() * 20) + 1;
        b = Math.floor(Math.random() * a) + 1;
        answer = a - b;
      } else {
        a = Math.floor(Math.random() * 9) + 2;
        b = Math.floor(Math.random() * 9) + 2;
        answer = a * b;
      }
      return { text: a + ' ' + op + ' ' + b, answer };
    }

    const problems = [];
    for (let i = 0; i < 20; i++) problems.push(genProblem());

    // --- MNIST Model ---
    let model = null;

    async function loadModel() {
      try {
        model = await tf.loadLayersModel('model/model.json');
        console.log('Model loaded successfully');
        console.log('Model input shape:', model.inputs[0].shape);
      } catch (e) {
        console.error('Could not load model:', e);
        model = null;
      }
    }

    // --- Digit recognition ---
    function recognizeDigit(canvas) {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = 28;
      tempCanvas.height = 28;
      const tempCtx = tempCanvas.getContext('2d');

      const srcCtx = canvas.getContext('2d');
      const imgData = srcCtx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
      let hasPixels = false;

      for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {
          const i = (y * canvas.width + x) * 4;
          if (data[i + 3] > 128 && data[i] < 128) {
            hasPixels = true;
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      }

      if (!hasPixels) return null;

      const pad = 20;
      minX = Math.max(0, minX - pad);
      minY = Math.max(0, minY - pad);
      maxX = Math.min(canvas.width, maxX + pad);
      maxY = Math.min(canvas.height, maxY + pad);

      const w = maxX - minX;
      const h = maxY - minY;
      const size = Math.max(w, h);
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;

      tempCtx.fillStyle = 'white';
      tempCtx.fillRect(0, 0, 28, 28);
      tempCtx.drawImage(canvas,
        cx - size/2, cy - size/2, size, size,
        2, 2, 24, 24
      );

      return tempCanvas;
    }

    async function predict(canvas) {
      const processed = recognizeDigit(canvas);
      if (!processed) return -1;
      if (!model) return -1;

      const tensor = tf.browser.fromPixels(processed, 1)
        .toFloat()
        .div(255.0)
        .sub(1.0)
        .mul(-1.0)
        .reshape([1, 28, 28, 1]);
      const pred = model.predict(tensor);
      const digit = pred.argMax(1).dataSync()[0];
      tensor.dispose();
      pred.dispose();
      return digit;
    }

    // Split canvas into digit regions by columns
    function splitDigits(canvas) {
      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;

      const colHasInk = new Array(canvas.width).fill(false);
      for (let x = 0; x < canvas.width; x++) {
        for (let y = 0; y < canvas.height; y++) {
          const i = (y * canvas.width + x) * 4;
          if (data[i + 3] > 128 && data[i] < 128) {
            colHasInk[x] = true;
            break;
          }
        }
      }

      const regions = [];
      let inRegion = false, start = 0;
      for (let x = 0; x <= canvas.width; x++) {
        if (x < canvas.width && colHasInk[x]) {
          if (!inRegion) { start = x; inRegion = true; }
        } else {
          if (inRegion) { regions.push({ start, end: x }); inRegion = false; }
        }
      }

      // Merge regions that are very close (part of same stroke)
      const merged = [];
      for (const r of regions) {
        if (merged.length > 0 && r.start - merged[merged.length - 1].end < 5) {
          merged[merged.length - 1].end = r.end;
        } else {
          merged.push({ ...r });
        }
      }

      // If a single region is very wide, it likely contains multiple digits — split it
      const final = [];
      for (const r of merged) {
        const width = r.end - r.start;
        if (width > 80) {
          // Find the column with least ink in the middle 60% to split on
          const searchStart = r.start + Math.floor(width * 0.2);
          const searchEnd = r.start + Math.floor(width * 0.8);
          let minInk = Infinity, splitAt = Math.floor((r.start + r.end) / 2);
          for (let x = searchStart; x < searchEnd; x++) {
            let ink = 0;
            for (let y = 0; y < canvas.height; y++) {
              const i = (y * canvas.width + x) * 4;
              if (data[i + 3] > 128 && data[i] < 128) ink++;
            }
            if (ink < minInk) { minInk = ink; splitAt = x; }
          }
          final.push({ start: r.start, end: splitAt });
          final.push({ start: splitAt, end: r.end });
        } else {
          final.push(r);
        }
      }
      return final;
    }

    async function recognizeNumber(canvas) {
      console.log('model loaded?', !!model);
      const regions = splitDigits(canvas);
      console.log('digit regions found:', regions.length, regions);
      if (regions.length === 0) return null;

      if (regions.length === 1) {
        // Single narrow region = single digit
        const width = regions[0].end - regions[0].start;
        if (width < 80) {
          const digit = await predict(canvas);
          console.log('single region predict:', digit);
          return digit >= 0 ? digit : null;
        }
        // Wide region already got split above, fall through to multi-digit
      }

      let result = '';
      for (const region of regions) {
        const digitCanvas = document.createElement('canvas');
        digitCanvas.width = region.end - region.start;
        digitCanvas.height = canvas.height;
        const dCtx = digitCanvas.getContext('2d');
        dCtx.drawImage(canvas, region.start, 0, digitCanvas.width, canvas.height, 0, 0, digitCanvas.width, canvas.height);
        const digit = await predict(digitCanvas);
        console.log('multi-digit region predict:', digit);
        if (digit >= 0) result += digit;
      }
      return result.length > 0 ? parseInt(result) : null;
    }

    // --- Drawing (click to draw, release to lift) ---
    const drawCanvas = document.getElementById('draw-canvas');
    const drawCtx = drawCanvas.getContext('2d');
    let gameActive = false;
    let lastX = null, lastY = null;
    let recognizeTimeout = null;
    let drawing = false;

    function clearCanvas() {
      drawCtx.fillStyle = 'white';
      drawCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
      document.getElementById('recognized').innerHTML = '&nbsp;';
      lastX = null;
      lastY = null;
    }

    function getPos(e) {
      const rect = drawCanvas.getBoundingClientRect();
      const clientX = e.clientX || (e.touches && e.touches[0].clientX);
      const clientY = e.clientY || (e.touches && e.touches[0].clientY);
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function onDown(e) {
      if (!gameActive) return;
      drawing = true;
      const { x, y } = getPos(e);
      lastX = x;
      lastY = y;

      if (!startTime) {
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 100);
      }

      // Cancel pending recognition — user is still drawing
      clearTimeout(recognizeTimeout);
    }

    function onMove(e) {
      if (!gameActive || !drawing) return;

      const { x, y } = getPos(e);
      if (x < 0 || x > drawCanvas.width || y < 0 || y > drawCanvas.height) return;

      if (lastX !== null && lastY !== null) {
        drawCtx.beginPath();
        drawCtx.moveTo(lastX, lastY);
        drawCtx.lineTo(x, y);
        drawCtx.strokeStyle = '#111';
        drawCtx.lineWidth = 6;
        drawCtx.lineCap = 'round';
        drawCtx.stroke();
      }

      lastX = x;
      lastY = y;
    }

    function onUp() {
      if (!drawing) return;
      drawing = false;
      lastX = null;
      lastY = null;

      // Recognize quickly after pen lift (300ms to allow for multi-stroke digits)
      clearTimeout(recognizeTimeout);
      recognizeTimeout = setTimeout(autoRecognize, 300);
    }

    drawCanvas.addEventListener('mousedown', onDown);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    drawCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); onDown(e); });
    drawCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); onMove(e); });
    drawCanvas.addEventListener('touchend', (e) => { e.preventDefault(); onUp(); });

    // --- Correct answer ding ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playDing() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.setValueAtTime(1174.7, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
    }

    async function autoRecognize() {
      if (!gameActive) return;
      console.log('autoRecognize triggered');
      const num = await recognizeNumber(drawCanvas);
      console.log('recognized:', num, 'expected:', problems[currentIndex].answer);
      if (num !== null) {
        document.getElementById('recognized').textContent = num;
        if (num === problems[currentIndex].answer) {
          playDing();
          setTimeout(() => advanceCorrect(), 200);
        }
      } else {
        document.getElementById('recognized').textContent = '?';
      }
    }

    // --- Game state ---
    let currentIndex = 0;
    let startTime = null;
    let timerInterval = null;
    let correctCount = 0;
    let answerResults = [];

    function updateDisplay() {
      const prev = document.getElementById('prob-prev');
      const curr = document.getElementById('prob-current');
      const next = document.getElementById('prob-next');
      const progress = document.getElementById('progress');

      if (currentIndex > 0) {
        const p = problems[currentIndex - 1];
        const mark = answerResults[currentIndex - 1]
          ? '<span class="correct-mark">&#10003;</span>'
          : '<span class="wrong-mark">&#10007;</span>';
        prev.innerHTML = p.text + ' = ' + p.answer + mark;
      } else {
        prev.textContent = '';
      }

      if (currentIndex < 20) {
        curr.textContent = problems[currentIndex].text + ' = ?';
        progress.textContent = (currentIndex + 1) + ' / 20';
      }

      if (currentIndex + 1 < 20) {
        next.textContent = problems[currentIndex + 1].text + ' = ?';
      } else {
        next.textContent = '';
      }
    }

    function advanceCorrect() {
      if (!gameActive) return;
      answerResults.push(true);
      correctCount++;
      currentIndex++;
      clearCanvas();

      if (currentIndex >= 20) {
        endGame();
        return;
      }
      updateDisplay();
    }

    function updateTimer() {
      const elapsed = (Date.now() - startTime) / 1000;
      document.getElementById('timer').textContent = elapsed.toFixed(1) + 's';
    }

    function endGame() {
      gameActive = false;
      clearInterval(timerInterval);
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      document.getElementById('game').style.display = 'none';
      document.getElementById('results').style.display = 'block';
      document.getElementById('final-time').textContent = elapsed + 's';
      document.getElementById('accuracy').textContent = correctCount + ' / 20 correct';
    }

    // --- Clear button + keyboard ---
    document.getElementById('clear-btn').addEventListener('click', () => {
      if (gameActive) clearCanvas();
    });
    document.addEventListener('keydown', (e) => {
      if (!gameActive) return;
      if (e.key === 'c' || e.key === 'C') {
        clearCanvas();
        e.preventDefault();
      }
    });

    // --- Init ---
    document.getElementById('start-btn').addEventListener('click', async () => {
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      await loadModel();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('game').style.display = 'block';
      gameActive = true;
      clearCanvas();
      updateDisplay();
    });
  </script>
</body>
</html>
