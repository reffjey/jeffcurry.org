<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeff Curry</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #222;
    }
    .card {
      text-align: center;
      padding: 3rem 2rem;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }
    .links a {
      color: #555;
      text-decoration: none;
      font-size: 1.05rem;
      padding: 0.5rem 1.2rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .links a:hover {
      color: #000;
      border-color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Jeff Curry</h1>
    <div class="links">
      <a href="https://linkedin.com/in/YOUR_LINKEDIN" target="_blank">LinkedIn</a>
      <a href="https://open.spotify.com/user/YOUR_SPOTIFY" target="_blank">Spotify</a>
      <a href="https://scholar.google.com/citations?user=YOUR_SCHOLAR_ID" target="_blank">Google Scholar</a>
    </div>
  </div>
</body>
</html>
