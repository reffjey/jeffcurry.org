<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeff Curry</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Times New Roman", Times, serif;
      font-size: 18px;
      line-height: 1.7;
      background: #fffff8;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #paint {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      z-index: 0;
      cursor: default;
    }
    .page {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
      pointer-events: none;
    }
    .page * {
      pointer-events: auto;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: normal;
      margin-bottom: 0.6rem;
      pointer-events: none;
    }
    .bio {
      font-size: 1rem;
      color: #555;
      margin-bottom: 0.6rem;
      pointer-events: none;
    }
    .status {
      font-size: 1rem;
      color: #555;
      margin-bottom: 1.5rem;
      pointer-events: none;
    }
    nav {
      font-size: 1rem;
      line-height: 2;
    }
    a {
      color: #0000ee;
      text-decoration: underline;
      padding: 2px 4px;
      transition: background 0.15s, color 0.15s;
    }
    a:visited {
      color: #551a8b;
    }
    a:hover {
      background: #00e5ff;
      color: #111;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <canvas id="paint"></canvas>
  <div class="page">
    <h1>Jeff Curry</h1>
    <p class="bio">chaotic good</p>
    <p class="status">currently: Coinbase &rarr; AI</p>
    <nav>
      <a href="https://www.linkedin.com/in/jeffrey-curry/" target="_blank">LinkedIn</a><br>
      <a href="https://open.spotify.com/artist/1amTGexKswbu26LrYlfoGj?si=sjHltRZKTTeig-9ydCRyww" target="_blank">Spotify</a><br>
      <a href="https://scholar.google.com/citations?user=3UqJFZkAAAAJ&hl=en" target="_blank">Google Scholar</a><br>
      <a href="brain-age.html">Brain Age</a>
    </nav>
  </div>
  <script>
    // Paint canvas
    const canvas = document.getElementById('paint');
    const ctx = canvas.getContext('2d');
    const RES = 384;
    let resY;

    function sizeCanvas() {
      const aspect = window.innerHeight / window.innerWidth;
      canvas.width = RES;
      resY = Math.floor(RES * aspect);
      canvas.height = resY;
      canvas.style.width = '100vw';
      canvas.style.height = '100vh';
    }
    sizeCanvas();

    ctx.fillStyle = '#fffff8';
    ctx.fillRect(0, 0, RES, resY);

    // Colors
    const colors = [
      '#ee4444', '#ee8833', '#eecc33',
      '#44bb44', '#3388ee', '#8844cc', '#ee66aa',
    ];

    // Starter scribbles
    // Exclusion zone around center content
    const exLeft = RES * 0.38;
    const exRight = RES * 0.62;
    const exTop = resY * 0.35;
    const exBottom = resY * 0.65;

    function inExclusion(px, py) {
      return px > exLeft && px < exRight && py > exTop && py < exBottom;
    }

    function scribble(x, y, len, color, dir) {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = color;
      const cx = RES / 2, cy = resY / 2;
      for (let i = 0; i < len; i++) {
        // Deflect strongly before entering the zone
        const nextX = x + dir[0];
        const nextY = y + dir[1];
        if (inExclusion(nextX, nextY)) {
          dir[0] += (x - cx) * 0.15;
          dir[1] += (y - cy) * 0.15;
        }
        ctx.fillRect(Math.round(x), Math.round(y), 1, 1);
        if (Math.random() < 0.08) {
          dir[0] = -dir[0] + (Math.random() - 0.5) * 0.5;
          dir[1] = -dir[1] + (Math.random() - 0.5) * 0.5;
        }
        x += (Math.random() - 0.5) * 3 + dir[0];
        y += (Math.random() - 0.5) * 3 + dir[1];
      }
      ctx.globalAlpha = 1;
    }

    for (let i = 0; i < 7; i++) {
      const color = colors[Math.floor(Math.random() * colors.length)];
      // Start scribbles outside the exclusion zone
      let x, y;
      do {
        x = Math.random() * RES;
        y = Math.random() * resY;
      } while (inExclusion(x, y));
      const len = 500 + Math.random() * 300;
      const dx = (Math.random() - 0.5) * 2;
      const dy = (Math.random() - 0.5) * 2;
      scribble(x, y, len, color, [dx, dy]);
    }

    // Secret mode
    const secret = 'curry';
    let secretBuffer = '';
    document.addEventListener('keydown', (e) => {
      if (e.key.length === 1) {
        secretBuffer += e.key.toLowerCase();
        if (secretBuffer.length > secret.length) {
          secretBuffer = secretBuffer.slice(-secret.length);
        }
        if (secretBuffer === secret) {
          // Load the pixelated photo as a custom cursor
          const img = new Image();
          img.src = 'photo_pixel.png';
          img.onload = () => {
            const c = document.createElement('canvas');
            c.width = 32; c.height = 32;
            const cx = c.getContext('2d');
            cx.imageSmoothingEnabled = false;
            cx.drawImage(img, 0, 0, 32, 32);
            const dataUrl = c.toDataURL('image/png');
            canvas.style.cursor = 'url(' + dataUrl + ') 16 16, crosshair';
            document.body.style.cursor = 'url(' + dataUrl + ') 16 16, auto';
          };
          secretBuffer = '';
        }
      }
    });

    window.addEventListener('resize', () => {
      const imageData = ctx.getImageData(0, 0, RES, canvas.height);
      sizeCanvas();
      ctx.fillStyle = '#fffff8';
      ctx.fillRect(0, 0, RES, resY);
      ctx.putImageData(imageData, 0, 0);
    });
  </script>
</body>
</html>
